<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
    <meta name="theme-color" content="#ffffff"/>
    <title>B Square — Find Your Business Match</title>
    <link rel="icon" href="%PUBLIC_URL%/logo.png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{
        --blue:#3B9EE8;--blue2:#0E5DA0;--blue3:#3B9EE8;--bluebg:#EEF6FF;--blueborder:#C2DAFF;
        --dark:#0A1628;--white:#FFFFFF;--gray:#F5F8FC;--gray2:#EEF2F8;
        --text:#0A1628;--text2:#4B6280;--text3:#8AACC8;--text4:#BDD4E8;
        --border:#E2EBF5;--border2:#C2DAFF;
        --green:#22c55e;--red:#EF4444;
        --shadow:0 2px 16px rgba(10,22,40,.07);
        --shadow-md:0 4px 24px rgba(10,22,40,.1);
        --shadow-lg:0 8px 40px rgba(10,22,40,.14);
        --radius:14px;--radius-sm:10px;--radius-full:999px;

        /* Legacy variable names used by Connections/Requests/Profile/Chat/ProfileModal —
           remapped from the old dark theme to the new blue+white system so every
           screen shares one consistent look. */
        --bg:#F5F8FC;        /* page background */
        --s1:#FFFFFF;        /* card / row surface */
        --s2:#EEF6FF;        /* hover / alt surface (light blue tint) */
        --s3:#E2EBF5;        /* deeper alt surface */
        --b:#E2EBF5;         /* border */
        --b2:#1878C8;        /* accent border / primary blue */
        --t:#0A1628;         /* primary text */
        --t2:#4B6280;        /* secondary text */
        --t3:#8AACC8;        /* muted text */
        --lime:#1878C8;      /* old bright accent -> primary blue */
        --amber:#F59E0B;
        --rose:#EC4899;
        --violet:#7C3AED;
      }
      html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
      body{font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;background:#fff;color:var(--dark);overscroll-behavior:none}
      #root{min-height:100vh}
      ::selection{background:var(--blue);color:#fff}
      ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#F5F8FC}::-webkit-scrollbar-thumb{background:var(--blueborder);border-radius:2px}
      button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
      input,select,textarea{font-size:16px!important;font-family:'Plus Jakarta Sans',sans-serif}
      .leaflet-container{background:var(--gray)!important}
      .leaflet-control-attribution{display:none!important}
      .leaflet-control-zoom a{background:#fff!important;color:var(--blue)!important;border-color:var(--border)!important;font-weight:700!important}
      @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes ping{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.5);opacity:0}}
      @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
      @keyframes logoIn{0%{opacity:0;transform:scale(.5) rotate(-8deg)}70%{transform:scale(1.07) rotate(1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
      @keyframes barFill{from{width:0}to{width:100%}}
      @keyframes rippleOut{0%{transform:scale(.7);opacity:.5}100%{transform:scale(2.6);opacity:0}}
      @keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
      @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
      .sk{background:linear-gradient(90deg,#F0F6FF 25%,#E0ECFF 50%,#F0F6FF 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
